name: Flutter CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Code Analysis
        run: flutter analyze

      - name: Generate Android Platform Files
        run: flutter create --platforms=android .

      - name: Inject ProGuard Rules
        run: |
          mkdir -p android/app
          # Prevent R8 optimizations from damaging ML Kit internal classes
          echo "-dontwarn com.google.mlkit.vision.text.**" > android/app/proguard-rules.pro
          echo "-keep class com.google.mlkit.vision.text.** { *; }" >> android/app/proguard-rules.pro

      - name: Build Android APK
        run: flutter build apk --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
