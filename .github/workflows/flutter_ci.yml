name: Flutter CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Code Analysis
        run: flutter analyze

      - name: Generate Android Platform Files
        run: flutter create --platforms=android .

      - name: Inject ProGuard Rules and Fix ML Kit
        run: |
          mkdir -p android/app
          # Keep R8 from crashing the build
          echo "-dontwarn com.google.mlkit.vision.text.**" > android/app/proguard-rules.pro
          echo "-keep class com.google.mlkit.vision.text.** { *; }" >> android/app/proguard-rules.pro
          
          # Inject the missing native packages directly into the build configuration
          sed -i '/dependencies {/a \    implementation "com.google.mlkit:text-recognition-chinese:16.0.0"\n    implementation "com.google.mlkit:text-recognition-devanagari:16.0.0"\n    implementation "com.google.mlkit:text-recognition-japanese:16.0.0"\n    implementation "com.google.mlkit:text-recognition-korean:16.0.0"' android/app/build.gradle

      # Switched to debug mode so you can see error messages on your tablet screen if it crashes
      - name: Build Android APK
        run: flutter build apk --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
